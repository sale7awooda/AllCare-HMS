# =============================================================
# AllCare HMS — Fly.io Configuration
# =============================================================
app = "allcare-hms"
primary_region = "ams"  # Amsterdam — closest to Middle East with good latency

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"
  DB_PATH = "/data/allcare.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false     # NEVER sleep — always on
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "allcare_data"        # Persistent volume for SQLite
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
