# fly.toml app configuration file generated for allcare-hms on 2026-04-13T22:43:40+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'allcare-hms'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/allcare.db'
  NODE_ENV = 'production'
  PORT = '3001'

[[mounts]]
  source = 'allcare_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
